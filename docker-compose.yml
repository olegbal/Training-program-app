services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-training}
      POSTGRES_USER: ${POSTGRES_USER:-training}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-training}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-training} -d $${POSTGRES_DB:-training}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://training:training@postgres:5432/training}
      EXERCISES_DATASET_PATH: ${EXERCISES_DATASET_PATH:-/data/exercises-dataset/data/exercises.json}
    ports:
      - "8000:8000"
    volumes:
      - ./data/exercises-dataset:/data/exercises-dataset:ro
    depends_on:
      postgres:
        condition: service_healthy

  bot:
    build:
      context: ./apps/bot
    env_file:
      - path: .env
        required: false
    environment:
      API_URL: ${API_URL:-http://api:8000}
      MINI_APP_URL: ${MINI_APP_URL:-http://localhost:8080}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-replace_me}
      TELEGRAM_ALLOWED_USER_IDS: ${TELEGRAM_ALLOWED_USER_IDS:-}
    depends_on:
      api:
        condition: service_started

  mini-app:
    build:
      context: ./apps/mini-app
    environment:
      VITE_API_URL: ${VITE_API_URL:-/api}
    ports:
      - "5173:5173"
    depends_on:
      api:
        condition: service_started

  caddy:
    image: caddy:2.10-alpine
    ports:
      - "8080:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_started
      mini-app:
        condition: service_started

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
